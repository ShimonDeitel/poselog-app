name: Poselog
options:
  bundleIdPrefix: com.shimondeitel.positionlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Poselog:
    type: application
    platform: iOS
    sources:
      - path: Poselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.positionlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Poselog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PoselogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoselogTests
      - path: Poselog.storekit
    dependencies:
      - target: Poselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.positionlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PoselogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PoselogUITests
    dependencies:
      - target: Poselog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.positionlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Poselog:
    build:
      targets:
        Poselog: all
        PoselogTests: [test]
        PoselogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Poselog.storekit
    test:
      config: Debug
      storeKitConfiguration: Poselog.storekit
      targets:
        - PoselogTests
        - PoselogUITests
    archive:
      config: Release
